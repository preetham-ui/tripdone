<!DOCTYPE html>
<html>
<head>
<title>Trip Budget Planner</title>
<link rel="stylesheet" href="style.css">
</head><body>

<h1>Trip Budget Planner</h1>

<div class="container">

<label>From:</label>
<input type="text" id="from" placeholder="Hyderabad">

<label>Destination:</label>
<input type="text" id="destination" placeholder="Goa">

<label>Budget Per Person (₹):</label>
<input type="number" id="budget">

<label>Number of People:</label>
<input type="number" id="people">

<label>Trip Days:</label>
<input type="number" id="days">

<button onclick="planTrip()">Plan My Trip</button>

<div id="result"></div>

</div>

<script src="planner.js"></script>
<script src="script.js"></script>

</body>
</html>
